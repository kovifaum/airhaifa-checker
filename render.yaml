services:
  - type: web
    name: skywatch-flight-tracker
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skywatch-db
          property: connectionString
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: TWOCAPTCHA_KEY
        sync: false
      - key: BRIGHTDATA_HOST
        sync: false
      - key: BRIGHTDATA_PORT
        sync: false
      - key: BRIGHTDATA_USER
        sync: false
      - key: BRIGHTDATA_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: CHECK_INTERVAL_MS
        value: "30000"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/google-chrome-stable"

databases:
  - name: skywatch-db
    plan: free
    databaseName: skywatch
    user: skywatch
