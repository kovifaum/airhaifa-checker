services:
  - type: web
    name: skywatch-flight-tracker
    runtime: docker
    plan: starter
    healthCheckPath: /health
    disk:
      name: skywatch-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: TWOCAPTCHA_KEY
        sync: false
      - key: BRIGHTDATA_HOST
        sync: false
      - key: BRIGHTDATA_PORT
        sync: false
      - key: BRIGHTDATA_USER
        sync: false
      - key: BRIGHTDATA_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CHECK_INTERVAL_MS
        value: "30000"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/google-chrome-stable"
