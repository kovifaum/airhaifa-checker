services:
  - type: web
    name: skywatch-flight-tracker
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      - key: TWOCAPTCHA_KEY
        sync: false
      - key: CHECK_INTERVAL_MS
        value: "30000"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/google-chrome-stable"
